<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Background Image - Cute Cat with Flower Vibe */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.7;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1;
            max-width: 400px;
        }

        h1 { color: #d63384; font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #444; line-height: 1.4; }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 2;
        }

        #noBtn {
            background-color: #888;
            color: white;
            position: absolute;
        }

        /* Success Screen */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffb6c1; /* Soft Pink */
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .success-overlay h2 {
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.2);
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 2.5rem;
            animation: float 3s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg);
