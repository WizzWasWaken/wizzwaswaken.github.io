<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry 🥺</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.7;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 5; /* Keeps the text above the background */
            width: 80%;
            max-width: 350px;
        }

        h1 { color: #d63384; font-size: 1.8rem; }
        
        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 6;
        }

        #noBtn {
            background-color: #888;
            color: white;
            position: fixed; /* Fixed ensures it moves relative to the whole screen */
            z-index: 999; /* Ensures it's ALWAYS on top and clickable/hoverable */
            transition: 0.2s ease;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffb6c1; 
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .success-overlay h2 { font-size: 3rem; color: white; }

        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 2rem;
            pointer-events: none;
            animation: float 3s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <img src="https://images.unsplash.com/photo-1574158622672-b4d8150460bb?auto=format&fit=crop&q=80&w=1000" class="bg-image">

    <div class="container" id="mainBox">
        <h1>I'm Sorry... 🥺</h1>
        <p>Can we please make up?</p>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">YES</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()" style="top: 55%; left: 52%;">NO</button>
        </div>
    </div>

    <div class="success-overlay" id="success">
        <h2>I Love You! ❤️</h2>
    </div>

    <script>
        function moveNo() {
            const btn = document.getElementById('noBtn');
            
            // This math keeps the button within the inner 60% of the screen
            // so it is never near the edges.
            const padding = 20; 
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('success').style.display = 'flex';
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(heart);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
